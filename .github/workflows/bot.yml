name: 24/7 Telegram AI Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code From Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PyTelegramBotAPI and OpenAI Directly
      run: |
        python -m pip install --upgrade pip
        pip install pyTelegramBotAPI==4.12.0 openai==1.12.0

    - name: Run Telegram Bot With Direct Tokens
      env:
        TELEGRAM_BOT_TOKEN: "8646650236:AAGz-gjytZTuywcW6o1J6O6_fBRvF9majXQ"
        TOKEN1: "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"
        TOKEN2: "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"
      run: |
        timeout 21000 python bot.py || true
